name: Weekly Data Refresh

on:
  schedule:
    # Monday 8am JST = Sunday 23:00 UTC
    - cron: '0 23 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Update trends data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_trends.py

      - name: Update competitor intel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_competitors.py

      - name: Commit and push changes
        run: |
          git config user.name "vidcel-bot"
          git config user.email "bot@vidcel.io"
          git add data/trends.json data/competitors.json
          git diff --staged --quiet || git commit -m "chore: weekly refresh $(date -u '+%Y-%m-%d')"
          git push
